<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Thumbnail Downloader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>YouTube Thumbnail Downloader</h1>
    <input type="text" id="urlInput" placeholder="Paste YouTube video URL" />
    <button id="fetchBtn">Get Thumbnail</button>
    <div id="result" class="hidden">
      <p>Thumbnail:</p>
      <img id="thumbImg" alt="Thumbnail" />
      <a id="downloadLink" href="#" download>Download Thumbnail</a>
    </div>
    <p id="errorMsg" class="error hidden"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
